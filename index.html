<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Cancon Archives — Вики РВПИ</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="База знаний РВПИ сервера">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Подключаем красивую темную тему (как в Discord/Майнкрафте) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
</head>
<body>
  <div id="app">Загрузка Вики...</div>
  <script>
    window.$docsify = {
      name: 'Cancon Archives',
      repo: '',
      // Включаем встроенный поиск по статьям
      search: 'auto', 
      // Включаем боковое меню из файла _sidebar.md
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  <!-- Главные скрипты движка Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
